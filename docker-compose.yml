services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media    # Host directory mapping: persists uploads on the host!
      - db_data:/app/data     # DB volume, stays Docker-managed
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DEBUG=${DEBUG:-False}
      - SECURE_SSL_REDIRECT=False
    restart: unless-stopped

volumes:
  db_data: