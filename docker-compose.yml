services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - db_data:/app/db.sqlite3
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DEBUG=${DEBUG:-False}
    restart: unless-stopped

volumes:
  media_data:
  db_data:
